<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="umi.css">
</head>
<body>
    <div bg class="card bg-pink">
    <h2 bg class="card bg-pink">Login</h2>
    <form action=""  method="get">
        <label for="nama">Nama</label>
        <br>
        <input type="text" id="nama" placeholder="Masukkan Nama">
        <br>
        <label for="email">Email</label>
        <br>
        <input type="email" id="email" placeholder="Masukkan Email">
        <br>
        <label for="Password">Password</label>
        <br>
        <input type="password" id="Password" placeholder="Masukkan Password">
        <br>
        <label for="jk">jenis kelamin Laki-Laki</label>
        <br>
        <input type="radio" name="jk" id="laki" value="laki">
        <br>
        <label for="jk">jenis kelamin Perempuan</label>
        <br>
        <input type="radio" name="jk" id="Perempuan" value="Perempuan">
        <br>
        <button type="submit">Submit</button>
        <button disabled="disabled">Disabled</button>
        <button type="reset">Reset</button>
    </div>

    <div bg class="card bg-red">
        <h2>Buat akun</h2>
        <button type="button">Buat</button>
    </div>
    <div class="card">
        <a href="index.html" class="btn" >Kembali ke halaman utama</a><br>
    </div>
    </form>
    </form>
</body>
</html>
